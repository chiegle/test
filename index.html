<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roulette des Photos</title>
    <style>
        /* Design festif et optimisé pour mobile */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* Fond sombre pour faire ressortir les photos */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px; /* Moins de padding pour gagner de la place */
            text-align: center;
            color: white;
        }

        h1 { 
            color: #ff4757; 
            font-size: 1.4rem; 
            margin-bottom: 15px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .container {
            width: 100%;
            max-width: 800px; /* Plus large pour les grands écrans */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #photo-display {
            width: 100%;         /* Utilise toute la largeur du téléphone */
            max-height: 70vh;    /* Ne dépasse pas 70% de la hauteur de l'écran */
            object-fit: contain;  /* Affiche l'image entière sans la déformer ou la couper */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            background-color: #2a2a2a; /* Fond de secours pendant le chargement */
            
            /* Animation d'apparition */
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        button:active { transform: scale(0.90); }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 C'est moi la mariée 😀</h1>
        
        <img id="photo-display" src="" alt="Chargement...">

        <button onclick="afficherPhotoAleatoire()">Encore une ! 🎲</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const nombreDePhotos = 5; // MODIFIE ICI : mets ton nombre total de photos
        const dossier = "photos/"; // Ton dossier sur GitHub
        const extension = ".jpg";   // Vérifie bien si c'est .jpg ou .JPG
        
        const mesPhotos = [];

        // On remplit la liste de photos/1.jpg à photos/50.jpg
        for (let i = 1; i <= nombreDePhotos; i++) {
            mesPhotos.push(dossier + i + extension);
        }

        function afficherPhotoAleatoire() {
            const imgElement = document.getElementById('photo-display');
            const indexAleatoire = Math.floor(Math.random() * mesPhotos.length);
            
            // On ajoute un petit paramètre "?t=" pour forcer le navigateur à 
            // recharger l'image si on tombe deux fois sur la même de suite
            imgElement.src = mesPhotos[indexAleatoire] + "?t=" + new Date().getTime();
        }

        window.onload = afficherPhotoAleatoire;
    </script>

</body>
</html>
