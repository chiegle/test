<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké-Mariée : Attrapez-les toutes !</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #ff4757; font-size: 1.5rem; margin-top: 5px; margin-bottom: 2px; }
        h2 { color: #aaaaaa; font-size: 0.8rem; font-style: italic; margin-bottom: 10px; }

        /* Style du Compteur Pokédex */
        #pokedex-stats {
            background: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #ffda79;
            border: 1px solid #ffda79;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .photo-wrapper {
            width: 100%;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 15px;
        }

        #photo-display {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }

        /* Jauge de progression */
        #progress-container {
            width: 70%;
            height: 8px;
            background-color: #444;
            border-radius: 10px;
            display: none;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #ff4757;
            transition: width 0.1s;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        button:disabled { background-color: #555; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 Poké-Mariée 😀</h1>
        <h2>Trouve les 77 photos secrètes !</h2>

        <div id="pokedex-stats">Collection : <span id="count">0</span> / 77</div>

        <div class="photo-wrapper">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <img id="photo-display" src="" alt="Photo">
        </div>

        <button id="btn-next" onclick="afficherPhotoAleatoire()">Lancer la roulette ! 🎲</button>
    </div>

    <script>
        const nombreDePhotos = 77; 
        const dossier = "photos/"; 
        const extension = ".jpg";   
        
        // --- LOGIQUE POKEDEX ---
        // On récupère la liste des photos déjà vues stockée dans le téléphone
        let vues = JSON.parse(localStorage.getItem('photosVues')) || [];

        function updateStats() {
            document.getElementById('count').innerText = vues.length;
            if (vues.length === nombreDePhotos) {
                document.querySelector('h1').innerText = "🏆 MAÎTRE POKÉ-MARIÉE !";
                document.getElementById('pokedex-stats').style.borderColor = "#2ecc71";
                document.getElementById('pokedex-stats').style.color = "#2ecc71";
            }
        }

        const imgElement = document.getElementById('photo-display');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const btn = document.getElementById('btn-next');

        function afficherPhotoAleatoire() {
            imgElement.style.display = 'none';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            btn.disabled = true;

            const numAleatoire = Math.floor(Math.random() * nombreDePhotos) + 1;
            const url = dossier + numAleatoire + extension + "?t=" + new Date().getTime();

            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';

            xhr.onprogress = function(e) {
                if (e.lengthComputable) {
                    progressBar.style.width = (e.loaded / e.total * 100) + '%';
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    imgElement.src = URL.createObjectURL(xhr.response);
                    progressContainer.style.display = 'none';
                    imgElement.style.display = 'block';
                    btn.disabled = false;

                    // Marquer comme vue si c'est nouveau
                    if (!vues.includes(numAleatoire)) {
                        vues.push(numAleatoire);
                        localStorage.setItem('photosVues', JSON.stringify(vues));
                        updateStats();
                    }
                }
            };
            xhr.send();
        }

        window.onload = () => {
            updateStats();
            afficherPhotoAleatoire();
        };
    </script>
</body>
</html>
