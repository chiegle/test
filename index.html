<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roulette des Photos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Changement ici : aligne le contenu au début (en haut) */
            justify-content: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #ff4757; 
            font-size: 1.6rem; 
            /* On supprime la marge du haut du titre */
            margin-top: 5px; 
            margin-bottom: 5px; 
            font-weight: bold;
        }

        h2 {
            color: #aaaaaa;
            font-size: 0.85rem;
            font-style: italic;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .photo-wrapper {
            width: 100%;
            /* On ajuste la hauteur pour que tout tienne bien sans scroller */
            height: 68vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 15px;
        }

        #photo-display {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff4757;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 C'est moi la mariée 😀</h1>
        <h2>C'est moi la plus belle</h2>

        <div class="photo-wrapper">
            <div id="loader" class="loader"></div>
            <img id="photo-display" src="" alt="Photo">
        </div>

        <button id="btn-next" onclick="afficherPhotoAleatoire()">Encore une ! 🎲</button>
    </div>

    <script>
        const nombreDePhotos = 77; 
        const dossier = "photos/"; 
        const extension = ".jpg";   
        const mesPhotos = [];

        for (let i = 1; i <= nombreDePhotos; i++) {
            mesPhotos.push(dossier + i + extension);
        }

        const imgElement = document.getElementById('photo-display');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btn-next');

        function afficherPhotoAleatoire() {
            imgElement.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;
            const indexAleatoire = Math.floor(Math.random() * mesPhotos.length);
            imgElement.src = mesPhotos[indexAleatoire] + "?t=" + new Date().getTime();
        }

        imgElement.onload = function() {
            loader.style.display = 'none';
            imgElement.style.display = 'block';
            btn.disabled = false;
        };

        window.onload = afficherPhotoAleatoire;
    </script>
</body>
</html>
