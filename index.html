<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roulette des Photos</title>
    <style>
        /* Base de la page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Titre principal */
        h1 { 
            color: #ff4757; 
            font-size: 1.6rem; 
            margin-bottom: 5px; 
            font-weight: bold;
        }

        /* Sous-titre en italique et plus petit */
        h2 {
            color: #cccccc; /* Gris clair pour contraster */
            font-size: 1rem;
            font-style: italic;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        /* Conteneur de l'image et du chargement */
        .photo-wrapper {
            width: 100%;
            height: 65vh; /* Légèrement réduit pour laisser de la place aux titres */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        #photo-display {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }

        /* Animation de chargement */
        .loader {
            border: 5px solid #333;
            border-top: 5px solid #ff4757;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Bouton d'action */
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 C'est moi la mariée 😀</h1>
        <h2>C'est moi la plus belle</h2>

        <div class="photo-wrapper">
            <div id="loader" class="loader"></div>
            <img id="photo-display" src="" alt="Photo de la mariée">
        </div>

        <button id="btn-next" onclick="afficherPhotoAleatoire()">Encore une ! 🎲</button>
    </div>

    <script>
        // Configuration
        const nombreDePhotos = 77; 
        const dossier = "photos/"; 
        const extension = ".jpg";   
        const mesPhotos = [];

        // Génération de la liste des chemins vers les fichiers
        for (let i = 1; i <= nombreDePhotos; i++) {
            mesPhotos.push(dossier + i + extension);
        }

        const imgElement = document.getElementById('photo-display');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btn-next');

        function afficherPhotoAleatoire() {
            // On cache l'image actuelle et on active le loader
            imgElement.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            // Tirage aléatoire
            const indexAleatoire = Math.floor(Math.random() * mesPhotos.length);
            
            // Mise à jour de la source avec un paramètre anti-cache (?t=)
            imgElement.src = mesPhotos[indexAleatoire] + "?t=" + new Date().getTime();
        }

        // Action une fois que le fichier image est totalement téléchargé
        imgElement.onload = function() {
            loader.style.display = 'none';
            imgElement.style.display = 'block';
            btn.disabled = false;
        };

        // Lancement automatique au chargement de la page
        window.onload = afficherPhotoAleatoire;
    </script>

</body>
</html>
